- hosts: localhost
  vars:
    # Workers normally setsid() into tty-less sessions, which breaks anything that
    # sudos internally (brew pkg casks, mas — "a terminal is required to read the
    # password") and gives 1Password a new client identity per task. Sharing the
    # launching terminal's session instead lets the `sudo -v` priming in the make
    # targets cover every descendant sudo via the normal per-tty ticket, silently.
    # Requires ansible-core 2.21+ (ansible/ansible#86762).
    ansible_worker_session_isolation: false
  pre_tasks:
    # Bootstrap the service-account token via the desktop app — the one 1Password dialog a
    # run costs, since the token can't be fetched with the token it is fetching.
    - name: Retrieve 1Password service-account token
      ansible.builtin.set_fact:
        op_sa_token: "{{ lookup('community.general.onepassword', '1Password', field='dotfiles service account') }}"
      no_log: true
      tags: ['always']

    # Everything else — including the become password — reads from the Dotfiles vault via
    # the token, bypassing the desktop app (no dialog, works tty-less). Split from the
    # token task above: a set_fact value can't reference op_sa_token set in the same task.
    # The vault kwarg is mandatory: the plugin refuses service-account auth without it.
    - name: Retrieve the become password
      ansible.builtin.set_fact:
        ansible_become_password: "{{ lookup('community.general.onepassword', 'Personal MacBook', field='password', vault='Dotfiles', service_account_token=op_sa_token) }}"
      no_log: true
      tags: ['always']
  roles:
      - { role: base, tags: ['base', 'priority']}
      - { role: ssh, tags: ['ssh', 'priority']}
      - { role: osx, tags: ['osx']}
      - { role: projects, tags: [projects]}
