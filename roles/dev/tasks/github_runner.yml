# GitHub self-hosted runners for the org: count instances, each in its own dir
# (actions-runner-<n>) with its own registration and launchd service (svc.sh).
# Registration tokens are 1-hour, org-wide, multi-use — mint one per run via gh when
# possible, else pause for a pasted token (org settings -> Actions -> Runners -> New).
# A token can also be supplied with -e runner_reg_token=... .
# LocalHostName, not ansible_hostname: the kernel hostname lags System Settings renames.
- name: Read this machine's local host name
  ansible.builtin.command:
    argv: [scutil, --get, LocalHostName]
  register: local_host_name
  changed_when: false
  check_mode: no

- name: Check which runner instances are configured
  ansible.builtin.stat:
    path: "{{ github_runner.base_dir }}-{{ item }}/.runner"
  loop: "{{ range(1, github_runner.count | int + 1) | list }}"
  register: runner_instances

- name: Determine missing runner instances
  ansible.builtin.set_fact:
    runners_missing: "{{ runner_instances.results | rejectattr('stat.exists') | map(attribute='item') | list }}"

- name: Register missing runner instances
  when: runners_missing | length > 0
  block:
    - name: Mint a registration token via gh
      ansible.builtin.command:
        argv: [gh, api, -X, POST, "orgs/{{ github_runner.org }}/actions/runners/registration-token", --jq, .token]
      register: runner_token_api
      failed_when: false
      no_log: true
      when: runner_reg_token | default('') == ''

    - name: Ask for a registration token when gh can't mint one
      ansible.builtin.pause:
        prompt: |-
          gh could not mint a runner registration token (PAT lacks org runner admin).
          Get one from https://github.com/organizations/{{ github_runner.org }}/settings/actions/runners/new
          and paste it here
      register: runner_token_answer
      when:
        - runner_reg_token | default('') == ''
        - runner_token_api.rc != 0

    - name: Determine the registration token
      ansible.builtin.set_fact:
        runner_token: "{{ runner_reg_token | default(runner_token_api.stdout | default('') if runner_token_api.rc | default(1) == 0 else runner_token_answer.user_input | default(''), true) | trim }}"
      no_log: true

    - name: Download the runner package
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ github_runner.version }}/actions-runner-osx-arm64-{{ github_runner.version }}.tar.gz"
        dest: "/tmp/actions-runner-osx-arm64-{{ github_runner.version }}.tar.gz"
        checksum: "sha256:{{ github_runner.sha256 }}"

    - name: Create instance directories
      ansible.builtin.file:
        path: "{{ github_runner.base_dir }}-{{ item }}"
        state: directory
      loop: "{{ runners_missing }}"

    # command tar, not ansible.builtin.unarchive: the latter demands GNU tar on macOS.
    - name: Extract the runner into each instance
      ansible.builtin.command:
        argv: [tar, xzf, "/tmp/actions-runner-osx-arm64-{{ github_runner.version }}.tar.gz", -C, "{{ github_runner.base_dir }}-{{ item }}"]
        creates: "{{ github_runner.base_dir }}-{{ item }}/config.sh"
      loop: "{{ runners_missing }}"

    - name: Register each instance with the org
      ansible.builtin.command:
        argv:
          - ./config.sh
          - --unattended
          - --url
          - "{{ github_runner.org_url }}"
          - --token
          - "{{ runner_token }}"
          - --name
          - "{{ local_host_name.stdout | trim }}-{{ item }}"
        chdir: "{{ github_runner.base_dir }}-{{ item }}"
      loop: "{{ runners_missing }}"
      no_log: true

    - name: Install and start each instance's launchd service
      ansible.builtin.shell: ./svc.sh install && ./svc.sh start
      args:
        chdir: "{{ github_runner.base_dir }}-{{ item }}"
      loop: "{{ runners_missing }}"


# Tahoe's App Data protection ("node would like to access data from other apps") prompts
# per binary: every instance's bundled node (node20 AND node24) raises its own dialog the
# first time a job touches foreign app data, stalling CI mid-run. The prompt can't be
# reliably pre-triggered from a terminal (attribution follows the responsible process), so
# grant it directly: insert the TCC row a real approval writes, with the csreq compiled
# from each binary's own designated requirement. Requires the terminal's Full Disk Access.
- name: Grant each runner node access to app data (TCC)
  ansible.builtin.shell: |
    db="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
    for node in {{ github_runner.base_dir }}-*/externals/node*/bin/node; do
      granted=$(sqlite3 "$db" "SELECT auth_value FROM access WHERE service='kTCCServiceSystemPolicyAppData' AND client='$node';")
      [ -n "$granted" ] && continue
      req=$(codesign -d -r- "$node" 2>&1 | sed -n 's/^designated => //p')
      blob=$(mktemp); echo "$req" | csreq -r- -b "$blob"
      hex=$(xxd -p "$blob" | tr -d '\n'); rm -f "$blob"
      sqlite3 "$db" "INSERT INTO access (service, client, client_type, auth_value, auth_reason, auth_version, csreq, indirect_object_identifier, flags, last_modified, last_reminded) VALUES ('kTCCServiceSystemPolicyAppData', '$node', 1, 5, 2, 1, X'$hex', 'UNUSED', 0, strftime('%s','now'), 0);"
      echo "granted $node"
    done
  register: node_appdata
  changed_when: "'granted' in node_appdata.stdout"

# Jobs can touch FDA-protected paths, and a node without Full Disk Access fails there
# with no prompt at all — confusing, silent CI breakage. FDA can only be toggled by hand,
# but the flow is automatable up to that click: nodes not yet listed in the pane get
# auto-registered by a denied FDA-path touch (via launchd, so TCC attributes the access
# to node itself rather than this FDA-holding terminal), then the pane opens and we pause
# while each node's toggle is switched on.
- name: Grant runner nodes Full Disk Access
  tags:
    - permissions
  block:
    - name: Register and detect runner nodes lacking Full Disk Access
      ansible.builtin.shell: |
        db="/Library/Application Support/com.apple.TCC/TCC.db"
        for node in {{ github_runner.base_dir }}-*/externals/node*/bin/node; do
          granted=$(sqlite3 "$db" "SELECT auth_value FROM access WHERE service='kTCCServiceSystemPolicyAllFiles' AND client='$node';")
          if [ "$granted" != "2" ]; then
            if [ -z "$granted" ]; then
              label="fda-probe-$RANDOM"
              launchctl submit -l "$label" -- "$node" -e 'try{require("fs").readdirSync(process.env.HOME+"/Library/Mail")}catch(e){}' 2>/dev/null
              sleep 5; launchctl remove "$label" 2>/dev/null || true
            fi
            echo "$node"
          fi
        done
      register: nodes_no_fda
      changed_when: false
      check_mode: no

    - name: Walk through enabling Full Disk Access for the runner nodes
      when: nodes_no_fda.stdout_lines | length > 0
      block:
        - name: Open the Full Disk Access pane
          ansible.builtin.command:
            argv: [open, "x-apple.systempreferences:com.apple.preference.security?Privacy_AllFiles"]
          changed_when: false

        - name: Wait while the runner nodes are granted Full Disk Access
          ansible.builtin.pause:
            prompt: |-
              Switch ON Full Disk Access for each of these in the pane that just opened:
              {{ nodes_no_fda.stdout_lines | join('\n') }}
              Press Enter when done.
