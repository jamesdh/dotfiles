---
- name: Assert this is a Debian/Ubuntu host
  ansible.builtin.assert:
    that: ansible_os_family == "Debian"
    fail_msg: >-
      The remote-access role targets Debian/Ubuntu and is meant to run locally on
      a headless Linux VM (not macOS). Got ansible_os_family={{ ansible_os_family }}.

- name: Install OpenSSH server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600

# Import keys BEFORE hardening so we never disable password auth without a working
# key in place (lockout guard).
- name: Import GitHub public keys into authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ssh_user }}"
    key: "https://github.com/{{ item }}.keys"
    exclusive: false
    state: present
  loop: "{{ github_users }}"

- name: Harden sshd to key-only authentication
  ansible.builtin.copy:
    src: 00-hardening.conf
    dest: /etc/ssh/sshd_config.d/00-hardening.conf
    owner: root
    group: root
    mode: "0644"
  when: ssh_harden
  notify: Restart ssh

# Verify the EFFECTIVE config (sshd -T merges every drop-in under first-value-wins)
# so a competing file like 50-cloud-init.conf can't silently re-enable passwords.
# sshd -T also fails on a syntactically bad config, aborting the play before the
# handler restarts sshd.
- name: Read the effective sshd configuration
  ansible.builtin.command: /usr/sbin/sshd -T
  changed_when: false
  register: sshd_effective
  when: ssh_harden

- name: Assert sshd enforces key-only authentication
  ansible.builtin.assert:
    that:
      - "'passwordauthentication no' in sshd_effective.stdout"
      - "'kbdinteractiveauthentication no' in sshd_effective.stdout"
    fail_msg: >-
      sshd is not enforcing key-only auth — a drop-in sorting before
      00-hardening.conf (e.g. /etc/ssh/sshd_config.d/50-cloud-init.conf) is
      overriding it. sshd_config is first-value-wins.
    success_msg: sshd enforces key-only authentication.
  when: ssh_harden

- name: Add Tailscale package signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"

- name: Add Tailscale apt repository
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.tailscale-list"
    dest: /etc/apt/sources.list.d/tailscale.list
    owner: root
    group: root
    mode: "0644"

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check Tailscale connection state
  ansible.builtin.command: tailscale status
  register: tailscale_state
  changed_when: false
  failed_when: false

# Non-interactive join when an auth key is supplied. A rejected/expired key is not
# fatal here: bootstrap-linux.sh re-checks status and falls back to interactive
# login. no_log keeps the key out of Ansible output.
- name: Join the tailnet with an auth key
  ansible.builtin.command: >-
    tailscale up --authkey {{ tailscale_authkey }}
    {{ '--ssh' if tailscale_ssh | bool else '' }}
  when:
    - tailscale_authkey | length > 0
    - tailscale_state.rc != 0
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  failed_when: false
  no_log: true
