# Spaceballs settings sync via its CLI. The exported JSON lives in iCloud
# (App Configs/spaceballs), so one machine's export becomes every machine's
# import. The cask (moltenbits/tap, Brewfile.priority) links the CLI into
# /opt/homebrew/bin before this runs; older machines may have a manual
# /usr/local/bin symlink instead — hence a PATH lookup, not a fixed stat.
# tagged `always` (read-only check): both blocks below need this fact, and any
# other tag combo would leave it unregistered under --tags=export or
# --skip-tags=export selections.
- name: Check for spaceballs CLI
  shell: command -v spaceballs
  register: spaceballs_bin
  changed_when: false
  failed_when: false
  tags:
    - always

# Manual/on-demand only: overwrites the iCloud copy with THIS machine's
# settings. Excluded from default installs via --skip-tags=export in the
# Makefile; run deliberately with `make settings.export`.
- name: Export Spacebar settings to iCloud
  block:
    - name: Create spaceballs dir in iCloud App Configs
      file:
        path: "{{ spaceballs.config_dir }}"
        state: directory

    - name: Export settings
      shell: "spaceballs settings export '{{ spaceballs.config_file }}'"

  when: spaceballs_bin.rc == 0
  tags:
    - spaceballs
    - export

# Normal-install path: pull the iCloud copy into this machine's Spacebar.
- name: Import Spacebar settings from iCloud
  block:
    - name: Ensure settings file is materialized from iCloud
      shell: "brctl download '{{ spaceballs.config_file }}'"
      changed_when: false
      failed_when: false

    - name: Check exported settings exist in iCloud
      stat:
        path: "{{ spaceballs.config_file }}"
      register: spaceballs_settings

    - name: Import settings
      shell: "spaceballs settings import '{{ spaceballs.config_file }}'"
      when: spaceballs_settings.stat.exists

  when: spaceballs_bin.rc == 0
  tags:
    - spaceballs

# Spaceballs raises its own permission prompts once running, so open it and pause when the
# pane-toggle grants are missing. Interactive, hence the permissions tag.
- name: Grant Spaceballs the macOS permissions it needs
  tags:
    - permissions
  block:
    - name: Detect Spaceballs' missing macOS permissions
      ansible.builtin.include_tasks: tcc_missing_permissions.yml
      vars:
        tcc_client: com.moltenbits.spaceballs
        tcc_permissions: "{{ spaceballs.tcc_permissions }}"

    - name: Walk through Spaceballs' permission prompts
      when: tcc_missing_permissions | length > 0
      block:
        - name: Open Spaceballs
          ansible.builtin.command:
            argv: [open, -a, Spaceballs]
          changed_when: false

        - name: Wait while Spaceballs' permissions are granted
          ansible.builtin.pause:
            prompt: |-
              Spaceballs still needs: {{ tcc_missing_permissions | map(attribute='name') | join(', ') }}
              Approve its prompts (or enable it in the Privacy panes).
              Press Enter when done.
