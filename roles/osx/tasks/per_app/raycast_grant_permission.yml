# Grant one batch of Raycast permissions that share a triggering deeplink (e.g. the three
# folder permissions are all requested by the one file-search command): fire the deeplink
# that makes Raycast request them, then wait. Nothing else may open after the deeplink —
# Raycast's popup dismisses itself as soon as another app takes focus. One batch per include
# so each gets its own pause — firing the next deeplink would likewise dismiss this one's
# Raycast confirmation dialog.
- name: "Trigger Raycast's request for {{ perm_names }}"
  ansible.builtin.command:
    argv: [open, "{{ perm_deeplink }}"]
  changed_when: false

- name: "Wait while {{ perm_names }} is granted to Raycast"
  ansible.builtin.pause:
    prompt: |-
      Raycast needs: {{ perm_names }}
        1. Click "Run Command" in the Raycast popup to trigger the request.
        2. Approve the macOS prompt(s).
      If no prompt appears, grant it manually:
        open "x-apple.systempreferences:com.apple.preference.security?{{ perm_pane }}"
      Press Enter when done.
