# Query the TCC databases and set tcc_missing_permissions to the entries of tcc_permissions
# not yet granted to tcc_client. Callers pass:
#   tcc_client      - the app's bundle id (e.g. com.raycast.macos)
#   tcc_permissions - list of {name, service, ...}
# Both databases (system-wide /Library and per-user ~/Library) are queried for granted
# services in one shot each. Reading them requires Full Disk Access (granted to the
# terminal during bootstrap); without it sqlite exits nonzero and the task fails loudly
# rather than misreporting every permission as missing.
- name: "Read {{ tcc_client }}'s system-wide TCC grants"
  ansible.builtin.command:
    argv:
      - sqlite3
      - "/Library/Application Support/com.apple.TCC/TCC.db"
      - "SELECT service FROM access WHERE client='{{ tcc_client }}' AND auth_value=2;"
  register: tcc_system_grants
  changed_when: false
  check_mode: no

- name: "Read {{ tcc_client }}'s per-user TCC grants"
  ansible.builtin.command:
    argv:
      - sqlite3
      - "{{ home_dir }}/Library/Application Support/com.apple.TCC/TCC.db"
      - "SELECT service FROM access WHERE client='{{ tcc_client }}' AND auth_value=2;"
  register: tcc_user_grants
  changed_when: false
  check_mode: no

# auth_value 2 = allowed; a denied row (0) or a missing row both mean not yet granted.
- name: "Determine which permissions {{ tcc_client }} still needs"
  ansible.builtin.set_fact:
    tcc_missing_permissions: "{{ tcc_permissions | rejectattr('service', 'in', tcc_system_grants.stdout_lines + tcc_user_grants.stdout_lines) | list }}"
