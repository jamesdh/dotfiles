- name: "Disable OSX Spotlight shortcut defaults"
  shell: > 
    /usr/libexec/PlistBuddy
    -c "delete :AppleSymbolicHotKeys:64"
    -c "add :AppleSymbolicHotKeys:64:enabled bool false"
    -c "add :AppleSymbolicHotKeys:64:value:type string standard"
    -c "add :AppleSymbolicHotKeys:64:value:parameters array"
    -c "add :AppleSymbolicHotKeys:64:value:parameters: integer 32"
    -c "add :AppleSymbolicHotKeys:64:value:parameters: integer 49"
    -c "add :AppleSymbolicHotKeys:64:value:parameters: integer 1048576"
    ~/Library/Preferences/com.apple.symbolichotkeys.plist
  ignore_errors: true
   
- name: Set Raycast folder index scope
  community.general.osx_defaults:
    domain: com.raycast.macos
    key: "permissions.folders.read:{{ item }}"
    type: bool
    value: true
    state: present
  loop: "{{ raycast.folder_scopes }}"
  tags:
    - defaults

# Detect which macOS permissions Raycast lacks and walk through granting each. The grant
# step pauses for manual TCC toggles, so the whole block is tagged raycast_permissions and
# skipped by the unattended install targets — run it via `make install.raycast-permissions`.
- name: Grant Raycast the macOS permissions it needs
  tags:
    - raycast_permissions
  block:
    - name: Read Raycast's macOS permission (TCC) grants
      ansible.builtin.command:
        argv:
          - sqlite3
          - "{{ '/Library/Application Support/com.apple.TCC/TCC.db' if item.scope == 'system' else home_dir ~ '/Library/Application Support/com.apple.TCC/TCC.db' }}"
          - "SELECT auth_value FROM access WHERE service='{{ item.service }}' AND client='com.raycast.macos';"
      loop: "{{ raycast.tcc_permissions }}"
      loop_control:
        label: "{{ item.name }}"
      register: raycast_tcc
      changed_when: false
      check_mode: no
      failed_when: false

    # auth_value 2 = allowed; a denied row (0) or a missing row (empty) both mean not yet granted.
    - name: Determine which Raycast permissions still need granting
      ansible.builtin.set_fact:
        raycast_missing_permissions: "{{ raycast_tcc.results | rejectattr('stdout', 'equalto', '2') | map(attribute='item') | list }}"

    - name: Report Raycast permissions that still need a manual grant
      ansible.builtin.debug:
        msg: "Raycast still needs granting: {{ raycast_missing_permissions | map(attribute='name') | join(', ') }}"
      when: raycast_missing_permissions | length > 0

    - name: Trigger and grant each missing permission
      when: raycast_missing_permissions | length > 0
      block:
        - name: Launch Raycast so it can service the permission-triggering deeplinks
          ansible.builtin.command:
            argv: [open, -g, -a, Raycast]
          changed_when: false

        - name: Give Raycast a moment to start
          ansible.builtin.pause:
            seconds: 3

        - name: Walk through each missing permission one at a time
          ansible.builtin.include_tasks: raycast_grant_permission.yml
          loop: "{{ raycast_missing_permissions }}"
          loop_control:
            label: "{{ item.name }}"

