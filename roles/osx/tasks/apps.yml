# We do this to get the privilege escalation prompts out of the way and to stop interrupting
# the larger install process
- name: Install Privileged Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.privileged
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'

- name: Install Privileged Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when: 
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed
  
# We need some way to show Brewfile differences in "check" mode
# Hence this bizaro task and subsequent debug task after it
- name: Check Non-priority Brewfile against installed apps
  shell: brew bundle check --verbose --file=roles/osx/files/Brewfile.nonpriority
  register: brew_diff
  ignore_errors: true
  failed_when: false
  changed_when: brew_diff.rc != 0
  check_mode: no
  when: 
    - ansible_check_mode

- name: Check Non-priority Brewfile - Changed output
  debug:
    var: brew_diff.stdout
  when: 
    - ansible_check_mode 
    - brew_diff.rc != 0
  changed_when: brew_diff.rc != 0

- name: Install Non-priority Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.nonpriority
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'

- name: Install Non-priority Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when:
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed

# Machine-profile apps: ~/.dotfiles-profile ("personal", "proximal", or "base" for
# deliberately none of the extras — written by bootstrap.sh) selects which extra Brewfile
# this machine gets. When the file is missing, prompt for it right here (pause captures
# typed input) and persist the answer. An unrecognized value installs neither and warns —
# a wrong default could push personal-only apps onto the work machine.
- name: Read the machine profile
  ansible.builtin.command:
    argv: [cat, "{{ home_dir }}/.dotfiles-profile"]
  register: machine_profile
  changed_when: false
  check_mode: no
  failed_when: false

- name: Prompt for the machine profile when the file is missing
  ansible.builtin.pause:
    prompt: "~/.dotfiles-profile is missing. Which profile is this machine? (personal / proximal / base)"
  register: machine_profile_answer
  when: machine_profile.rc != 0

- name: Determine the effective machine profile
  ansible.builtin.set_fact:
    machine_profile_value: "{{ (machine_profile.stdout if machine_profile.rc == 0 else machine_profile_answer.user_input | default('')) | trim | lower }}"

- name: Persist the prompted machine profile
  ansible.builtin.copy:
    content: "{{ machine_profile_value }}\n"
    dest: "{{ home_dir }}/.dotfiles-profile"
    mode: "0644"
  when:
    - machine_profile.rc != 0
    - machine_profile_value in ['personal', 'proximal', 'base']

- name: Warn when the machine profile is unrecognized
  ansible.builtin.debug:
    msg: "Machine profile '{{ machine_profile_value }}' is not personal/proximal/base — skipping profile-specific apps. Write one of those to ~/.dotfiles-profile."
  when:
    - machine_profile_value not in ['personal', 'proximal', 'base']

- name: Install profile-specific Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.{{ machine_profile_value }}
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'
  when: machine_profile_value in ['personal', 'proximal']

- name: Install profile-specific Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when:
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed

- import_tasks: dequarantine.yml

# App Store apps live in Brewfile.mas — aggregated into the main Brewfile for
# interactive `make apps.*` use, but excluded from the ansible-run bundles: mas
# requires root and sudo-execs itself, and an in-bundle sudo prompt can never be
# answered (the worker tree is a background process group — reading the tty stops
# it with SIGTTIN). Ansible's become pipes the password instead, promptlessly.
- name: Install App Store apps (mas needs root; an in-bundle sudo prompt hangs forever)
  become: yes
  shell: "set -o pipefail; grep -o 'id: [0-9]*' roles/osx/files/Brewfile.mas | awk '{print $2}' | xargs mas install"
  register: mas_install
  changed_when: mas_install.stdout | length > 0
  tags:
    - mas

# After the nonpriority bundle so the binary exists (and is dequarantined) first
- import_tasks: per_app/ngrok.yml
  tags:
    - ngrok
