# We do this to get the privilege escalation prompts out of the way and to stop interrupting
# the larger install process
- name: Install Privileged Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.privileged
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'

- name: Install Privileged Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when: 
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed
  
# We need some way to show Brewfile differences in "check" mode
# Hence this bizaro task and subsequent debug task after it
- name: Check Non-priority Brewfile against installed apps
  shell: brew bundle check --verbose --file=roles/osx/files/Brewfile.nonpriority
  register: brew_diff
  ignore_errors: true
  failed_when: false
  changed_when: brew_diff.rc != 0
  check_mode: no
  when: 
    - ansible_check_mode

- name: Check Non-priority Brewfile - Changed output
  debug:
    var: brew_diff.stdout
  when: 
    - ansible_check_mode 
    - brew_diff.rc != 0
  changed_when: brew_diff.rc != 0

- name: Install Non-priority Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.nonpriority
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'

- name: Install Non-priority Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when:
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed

# Machine-profile apps: ~/.dotfiles-profile ("personal" or "proximal", written by
# bootstrap.sh) selects which extra Brewfile this machine gets. Missing/unknown profile
# installs neither — a wrong default could push personal-only apps onto the work machine.
- name: Read the machine profile
  ansible.builtin.command:
    argv: [cat, "{{ home_dir }}/.dotfiles-profile"]
  register: machine_profile
  changed_when: false
  check_mode: no
  failed_when: false

- name: Warn when the machine profile is missing
  ansible.builtin.debug:
    msg: "~/.dotfiles-profile is missing or not personal/proximal — skipping profile-specific apps. Re-run bootstrap or write the profile name to that file."
  when: machine_profile.stdout | default('') | trim not in ['personal', 'proximal']

- name: Install profile-specific Homebrew Apps
  shell: brew bundle --file=roles/osx/files/Brewfile.{{ machine_profile.stdout | trim }}
  register: brew_diff
  changed_when: '"Installing" in brew_diff.stdout'
  when: machine_profile.stdout | default('') | trim in ['personal', 'proximal']

- name: Install profile-specific Homebrew Apps - Changed output
  debug:
    var: brew_diff.stdout
  when:
    - brew_diff.changed
    - not ansible_check_mode
  changed_when: brew_diff.changed

- import_tasks: dequarantine.yml

# App Store apps live in Brewfile.mas — aggregated into the main Brewfile for
# interactive `make apps.*` use, but excluded from the ansible-run bundles: mas
# requires root and sudo-execs itself, and an in-bundle sudo prompt can never be
# answered (the worker tree is a background process group — reading the tty stops
# it with SIGTTIN). Ansible's become pipes the password instead, promptlessly.
- name: Install App Store apps (mas needs root; an in-bundle sudo prompt hangs forever)
  become: yes
  shell: "set -o pipefail; grep -o 'id: [0-9]*' roles/osx/files/Brewfile.mas | awk '{print $2}' | xargs mas install"
  register: mas_install
  changed_when: mas_install.stdout | length > 0
  tags:
    - mas

# After the nonpriority bundle so the binary exists (and is dequarantined) first
- import_tasks: per_app/ngrok.yml
  tags:
    - ngrok
