# Extend the sudo password timeout (macOS default 5 min) so privileged work — especially
# the brew-cask / mas sudos during an install — re-prompts less. The timeout is a sliding
# window refreshed on each sudo use, so this is minutes of inactivity before re-auth.
# Validated with visudo before install so a malformed drop-in can't lock sudo out; the
# filename has no dot (#includedir skips sudoers.d files containing '.').
- name: Extend the sudo timestamp timeout
  become: yes
  ansible.builtin.copy:
    dest: /etc/sudoers.d/timestamp_timeout
    content: "Defaults timestamp_timeout={{ sudo_timestamp_timeout }}\n"
    owner: root
    group: wheel
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  tags:
    - touchid
    - sudo

# Do sudo using Touch ID
- name: Set content of sudo file as fact
  set_fact:
    sudo_conf: "{{ lookup('file', '/etc/pam.d/sudo') }}"
  ignore_errors: yes
  tags:
    - touchid

# Wiring a module path into /etc/pam.d/sudo while the module file is absent breaks
# sudo system-wide ("sudo: unable to initialize PAM: No such file or directory"),
# even though the entry is marked "optional" — so never add it until pam-reattach
# (priority Brewfile) is actually installed.
- name: Check that the pam_reattach module is installed
  stat:
    path: /opt/homebrew/lib/pam/pam_reattach.so
  register: pam_reattach_mod
  tags:
    - touchid

# See...
# https://browniebroke.com/blog/enabling-sudo-via-touchid-using-ansible/
# https://apple.stackexchange.com/a/355880
# https://github.com/fabianishere/pam_reattach
- name: Set sudo via Touch ID if not setup
  become: yes
  command: sed -i '' 's/auth       sufficient     pam_smartcard.so/auth       sufficient     pam_smartcard.so\nauth       optional       \/opt\/homebrew\/lib\/pam\/pam_reattach.so\nauth       sufficient     pam_tid.so/g' /etc/pam.d/sudo
  when:
    - pam_reattach_mod.stat.exists
    - "'auth       sufficient     pam_tid.so' not in sudo_conf"
  tags:
    - touchid