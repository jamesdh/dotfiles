raycast:
  # Raycast's own folder-index scopes, applied as `permissions.folders.read:<scope>` bools by
  # per_app/raycast.yml. Kept out of defaults.userapps because the literal colon in the key
  # trips library/osx_defaults.py's nested-key parser. TCC still gates the actual reads.
  folder_scopes:
    - "{{ home_dir }}/Desktop"
    - "{{ home_dir }}/Documents"
    - "{{ home_dir }}/Downloads"
    - cloudStorage
    - removableVolumes
  # macOS permissions (TCC) Raycast needs; each must be granted by hand (TCC can't be
  # scripted). scope selects the database: system = /Library, user = ~/Library.
  tcc_permissions:
    - { name: Accessibility,    service: kTCCServiceAccessibility,               scope: system }
    - { name: Calendar,         service: kTCCServiceCalendar,                    scope: user }
    - { name: Desktop folder,   service: kTCCServiceSystemPolicyDesktopFolder,   scope: user }
    - { name: Documents folder, service: kTCCServiceSystemPolicyDocumentsFolder, scope: user }
    - { name: Downloads folder, service: kTCCServiceSystemPolicyDownloadsFolder, scope: user }

