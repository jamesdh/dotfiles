- name: Git config username
  git_config: 
    name: user.name
    scope: global
    value: James Hardwick

- name: Git config email
  git_config: 
    scope: global
    name: user.email
    value: jamesdh@gmail.com

# Public half of the signing key (the 1Password agent holds the private half),
# resolved from GitHub's registered SSH *signing* keys (a separate registry from
# the authentication keys at github.com/<user>.keys), anchored on the key title.
# Fails loudly if the title disappears. curl instead of the url lookup because
# urllib inside a forked worker trips macOS's Objective-C fork-safety abort.
- name: Git config signing key
  git_config:
    scope: global
    name: user.signingkey
    value: "{{ lookup('ansible.builtin.pipe', 'curl -sf https://api.github.com/users/jamesdh/ssh_signing_keys') | from_json | selectattr('title', 'equalto', 'GitHub') | map(attribute='key') | first }}"

- name: Git gpg format
  git_config:
    scope: global
    name: gpg.format
    value: ssh

- name: Git config gpg program
  git_config:
    scope: global
    name: gpg.ssh.program
    value: "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"

- name: Git config commit signing
  git_config:
    scope: global
    name: commit.gpgsign
    value: "true"

- name: Git config merge tool
  git_config: 
    scope: global
    name: mergetool.p4merge.cmd
    value: "{{apps_dir}}/p4merge.app/Contents/MacOS/p4merge $BASE $LOCAL $REMOTE $MERGED"
  
- name: Git config merge tool
  git_config: 
    scope: global
    name: mergetool.p4merge.keeptemporaries
    value: "false"
  
- name: Git config merge tool
  git_config: 
    scope: global
    name: mergetool.p4merge.trustexitcode
    value: "false"
  
- name: Git config merge tool
  git_config: 
    scope: global
    name: mergetool.p4merge.keepbackup
    value: "false"

- name: Git config merge tool
  git_config: 
    scope: global
    name: merge.tool
    value: p4merge
  
- name: Git config difftool
  git_config: 
    scope: global
    name: difftool.p4merge.cmd
    value: "{{apps_dir}}/p4merge.app/Contents/MacOS/p4merge $BASE $LOCAL"
  
- name: Git config diff tool
  git_config: 
    scope: global
    name: diff.tool
    value: p4merge

# Reading a value via git_config was removed in newer community.general
# (state=present now requires `value`); reads live in git_config_info, which
# returns the same config_value key the check below relies on.
- name: Check if Git LFS is installed
  community.general.git_config_info:
    scope: global
    name: filter.lfs.process
  register: lfs_config

- name: Install Git LFS if not already installed
  shell: git lfs install
  when: '"git-lfs" not in lfs_config.config_value'

