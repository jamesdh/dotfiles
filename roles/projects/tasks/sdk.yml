
- name: Check if SDKMAN is installed
  stat: 
    path: "{{home_dir}}/.sdkman"
  register: sdk_home

- name: Install SDKMAN
  block: 
    - name: Download SDKMAN install script
      get_url:
        url: https://get.sdkman.io
        dest: "{{home_dir}}/.sdkman_installer"

    # The installer's shebang is a hardcoded #!/bin/bash — Apple's frozen Bash 3.2 —
    # and SDKMAN requires Bash 4+, so invoke it through Homebrew's bash explicitly
    # (installed by Brewfile.priority before this role runs).
    - name: Run SDKMAN script
      shell: "/opt/homebrew/bin/bash {{home_dir}}/.sdkman_installer"

    - name: Remove installer script
      file: 
        path: "{{home_dir}}/.sdkman_installer"
        state: absent

  when: not sdk_home.stat.exists

- name: "Configure SDKMAN"
  ini_file:
    path: "{{home_dir}}/.sdkman/etc/config"
    section: null
    option: sdkman_auto_env
    value: "true"
    mode: '0644'
    no_extra_spaces: yes
    backup: yes
    
- name: Install SDKMAN sdk's
  shell: "source {{home_dir}}/.sdkman/bin/sdkman-init.sh && sdk install {{item.name}} {{item.version}}"
  args:
    executable: /opt/homebrew/bin/bash # sdkman scripts require Bash 4+, not /bin/sh (3.2)
  loop: "{{sdks}}"
  register: result
  failed_when: 
    - result.rc > 0
    - '"is already installed" not in result.stdout'
  changed_when: 
    - result.rc == 0
    - '"Done installing!" in result.stdout'
    - '"is already installed" not in result.stdout'